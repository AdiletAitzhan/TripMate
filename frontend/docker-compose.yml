services:
  frontend:
    build: .
    container_name: tripmate_frontend
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app # Sync local files for hot-reloading
      - /app/node_modules # Don't overwrite container's node_modules
